<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>Bank Effect & Squat Simulator</title>
    <style>
        body { font-family: 'Arial', sans-serif; background: #1e1e24; color: #fff; margin: 20px; }
        .container { max-width: 900px; margin: 0 auto; background: #2a2a35; padding: 20px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        h1 { text-align: center; color: #4af; margin-bottom: 5px; }
        .subtitle { text-align: center; color: #aaa; font-size: 14px; margin-bottom: 20px; }
        .control-panel { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 20px; background: #343444; padding: 15px; border-radius: 8px; }
        .control-group { display: flex; flex-direction: column; }
        label { font-weight: bold; margin-bottom: 5px; color: #ddd; }
        input[type=range] { width: 100%; cursor: pointer; }
        .value-display { text-align: right; font-weight: bold; color: #4af; }
        .status-box { background: #222; padding: 15px; border-radius: 8px; text-align: center; font-size: 18px; font-weight: bold; border-left: 5px solid #ccc; margin-bottom: 20px; }
        .status-CRITICAL { border-left-color: #f33; color: #f33; animation: blink 1s infinite; }
        .status-WARNING { border-left-color: #f90; color: #f90; }
        .status-STABLE { border-left-color: #3c3; color: #3c3; }
        canvas { background: #132237; display: block; margin: 0 auto; border-radius: 6px; border: 2px solid #444; }
        .vector-legend { display: flex; justify-content: center; gap: 20px; margin-top: 10px; font-size: 12px; }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    </style>
</head>
<body>

<div class="container">
    <h1>Bank Effect & Squat Simulator</h1>
    <div class="subtitle">항해학 관점의 수로 유체역학 시뮬레이터 (에버기븐호 좌초 분석용)</div>

    <div class="control-panel">
        <div class="control-group">
            <label>선박 속력 (Speed): <span class="value-display" id="spd-val">13</span> kts</label>
            <input type="range" id="speed" min="5" max="17" step="0.5" value="13">
        </div>
        <div class="control-group">
            <label>측벽과의 거리 (Distance to Bank): <span class="value-display" id="dist-val">30</span> m</label>
            <input type="range" id="distance" min="15" max="90" step="1" value="30">
        </div>
        <div class="control-group">
            <label>외력 - 사풍 (Cross Wind): <span class="value-display" id="wind-val">35</span> kts</label>
            <input type="range" id="wind" min="0" max="50" step="1" value="35">
        </div>
    </div>

    <div class="status-box id="status-display">조종 상태 분석 중...</div>

    <canvas id="simCanvas" width="850" height="260"></canvas>

    <div class="vector-legend">
        <div class="legend-item"><span style="color:#f33;">➔</span> 선수 편향력 (Bank Cushion)</div>
        <div class="legend-item"><span style="color:#3af;">➔</span> 선미 흡입력 (Bank Suction)</div>
        <div class="legend-item"><span style="color:#fa0;">➔</span> 풍압력 (Wind Force)</div>
        <div class="legend-item"><span style="color:#f0f;">▼</span> 스쿼트 침하량 (Squat)</div>
    </div>
</div>

<script>
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');

    // 슬라이더 요소
    const spdSlider = document.getElementById('speed');
    const distSlider = document.getElementById('distance');
    const windSlider = document.getElementById('wind');

    // 디스플레이 요소
    const spdVal = document.getElementById('spd-val');
    const distVal = document.getElementById('dist-val');
    const windVal = document.getElementById('wind-val');
    const statusBox = document.getElementById('status-display');

    function drawArrow(x, y, len, angle, color, lineWidth = 3) {
        ctx.save();
        ctx.strokeStyle = color;
        ctx.fillStyle = color;
        ctx.lineWidth = lineWidth;
        ctx.beginPath();
        ctx.translate(x, y);
        ctx.rotate(angle);
        ctx.moveTo(0, 0);
        ctx.lineTo(len, 0);
        ctx.stroke();
        
        // 화살표 머리
        ctx.beginPath();
        ctx.moveTo(len, 0);
        ctx.lineTo(len - 7, -4);
        ctx.lineTo(len - 7, 4);
        ctx.fill();
        ctx.restore();
    }

    function updateSimulation() {
        const speed = parseFloat(spdSlider.value);
        const distance = parseFloat(distSlider.value);
        const wind = parseFloat(windSlider.value);

        // 값 업데이트
        spdVal.innerText = speed.toFixed(1);
        distVal.innerText = distance;
        windVal.innerText = wind;

        // 유체역학 계산 (간이 공식화)
        // 스쿼트 근사치: Cb * B * CC / 100... 여기선 속도의 제곱에 비례 관계 레이아웃
        const squat = (0.85 * Math.pow(speed * 0.514, 2)) / 9.81 * (150 / (200 - 58)); 
        
        // 측벽 효과 계산 (속도의 제곱에 비례, 거리의 제곱에 반비례)
        const bankForce = (Math.pow(speed, 2) / Math.pow(distance, 1.5)) * 1.5;
        const windForce = Math.pow(wind, 2) * 0.05;

        // 상태 판정
        let statusText = "";
        let statusClass = "";
        
        if (bankForce > 12 || (speed > 12 && distance < 35)) {
            statusText = `CRITICAL: 극심한 측벽 효과 발생! 선미 흡입으로 인해 대각선 제어 불능 (Squat: ${squat.toFixed(2)}m)`;
            statusClass = "status-CRITICAL";
        } else if (bankForce > 6 || speed > 11 || distance < 45) {
            statusText = `WARNING: 조종 성능 극도로 저하. 선교 자원 관리(BRM) 및 즉각 감속 필요 (Squat: ${squat.toFixed(2)}m)`;
            statusClass = "status-WARNING";
        } else {
            statusText = `STABLE: 안정적인 통항 상태 유지 중 (Squat: ${squat.toFixed(2)}m)`;
            statusClass = "status-STABLE";
        }
        
        statusBox.innerText = statusText;
        statusBox.className = "status-box " + statusClass;

        // 그리기 시작
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // 1. 수에즈 운하 수로 (제한구역 벽면)
        ctx.fillStyle = "#c2a679"; 
        ctx.fillRect(0, 0, canvas.width, 40); // 북측 벽 (상단)
        ctx.fillRect(0, canvas.height - 40, canvas.width, 40); // 남측 벽 (하단)

        // 센터라인
        ctx.strokeStyle = "rgba(255,255,255,0.15)";
        ctx.setLineDash([10, 10]);
        ctx.beginPath();
        ctx.moveTo(0, canvas.height/2);
        ctx.lineTo(canvas.width, canvas.height/2);
        ctx.stroke();
        ctx.setLineDash([]);

        // 2. 선박 위치 계산 (y축 거리에 비례)
        // 거리가 작을수록 아래쪽 벽(남측벽)에 붙는다고 가정
        const shipX = canvas.width / 2 - 100;
        const shipY = (canvas.height - 40) - (distance * 1.8); 
        
        // 선체 회전 각도 (Bank effect로 인해 선수는 벽에서 멀어지고 선미는 달라붙음)
        let yawAngle = 0;
        if (statusClass === "status-CRITICAL") yawAngle = -0.09;
        else if (statusClass === "status-WARNING") yawAngle = -0.04;
        
        ctx.save();
        ctx.translate(shipX, shipY);
        ctx.rotate(yawAngle);

        // 선체 그리기 (컨테이너선 탑뷰)
        ctx.fillStyle = "#333"; // 선체 색상
        ctx.beginPath();
        ctx.moveTo(-120, -20);
        ctx.lineTo(80, -20);
        ctx.quadraticCurveTo(120, -20, 140, 0); // 선수 모양
        ctx.quadraticCurveTo(120, 20, 80, 20);
        ctx.lineTo(-120, 20);
        ctx.closePath();
        ctx.fill();
        ctx.strokeStyle = "#666";
        ctx.stroke();

        // 적재된 컨테이너 표현 (알록달록 블록)
        const colors = ['#b33', '#33b', '#383', '#d82', '#555'];
        for(let i=0; i<8; i++) {
            ctx.fillStyle = colors[i % colors.length];
            ctx.fillRect(-110 + (i * 28), -16, 24, 32);
        }

        // 3. 유체역학 벡터 그리기 (선체 상대 좌표 기준)
        if (bankForce > 2) {
            // 선수 Cushion (벽에서 밀어냄 -> 상향 벡터)
            drawArrow(120, 0, bankForce * 3, -Math.PI/2, "#f33", 3);
            // 선미 Suction (벽으로 빨려감 -> 하향 벡터)
            drawArrow(-100, 0, bankForce * 4.5, Math.PI/2, "#3af", 3);
        }

        // 스쿼트 가라앉음 표시 (선체 중앙에 텍스트 및 하향 화살표)
        if(speed > 5) {
            ctx.fillStyle = "#f0f";
            ctx.font = "bold 11px Arial";
            ctx.fillText(`Squat: -${squat.toFixed(2)}m`, -30, 3);
        }

        ctx.restore();

        // 4. 외력 벡터 (사풍 - 위에서 아래로 부는 바람)
        if (wind > 0) {
            for(let i=0; i<3; i++) {
                drawArrow(shipX - 50 + (i*100), 55, wind * 0.8, Math.PI/2, "#fa0", 2);
            }
        }
    }

    // 이벤트 리스너 등록
    spdSlider.addEventListener('input', updateSimulation);
    distSlider.addEventListener('input', updateSimulation);
    windSlider.addEventListener('input', updateSimulation);

    // 초기 실행
    updateSimulation();
</script>

</body>
</html>
