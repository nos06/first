<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Advanced Bank Effect Simulator</title>

<style>
body{
    background:#1e1e24;
    color:white;
    font-family:Arial;
    margin:20px;
}
.container{
    max-width:1100px;
    margin:auto;
    background:#2a2a35;
    padding:20px;
    border-radius:10px;
}
.control-panel{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:15px;
}
.control-group{
    display:flex;
    flex-direction:column;
}
canvas{
    background:#132237;
    border:2px solid #444;
    border-radius:8px;
    margin-top:20px;
}
.status-box{
    margin-top:15px;
    padding:15px;
    font-weight:bold;
    text-align:center;
    border-left:6px solid #3c3;
    background:#222;
}
.critical{
    color:#ff4444;
    border-left-color:#ff4444;
}
.warning{
    color:#ffaa33;
    border-left-color:#ffaa33;
}
.stable{
    color:#44ff66;
    border-left-color:#44ff66;
}
</style>
</head>

<body>

<div class="container">

<h1>Advanced Bank Effect Simulator</h1>

<div class="control-panel">

<div class="control-group">
<label>Speed
<span id="spdVal">13</span> kts
</label>
<input id="speed" type="range" min="5" max="18" step="0.5" value="13">
</div>

<div class="control-group">
<label>Channel Position
<span id="posVal">50</span>
</label>
<input id="position" type="range" min="0" max="100" value="50">
</div>

<div class="control-group">
<label>Cross Wind
<span id="windVal">35</span> kts
</label>
<input id="wind" type="range" min="0" max="60" value="35">
</div>

<div class="control-group">
<label>Rudder
<span id="rudVal">0</span>°
</label>
<input id="rudder" type="range" min="-35" max="35" value="0">
</div>

<div class="control-group">
<label>Water Depth
<span id="depthVal">20</span> m
</label>
<input id="depth" type="range" min="12" max="35" value="20">
</div>

</div>

<div id="status" class="status-box stable">
Analyzing...
</div>

<canvas id="simCanvas" width="1000" height="350"></canvas>

</div>

<script>

const canvas=document.getElementById("simCanvas");
const ctx=canvas.getContext("2d");

const speed=document.getElementById("speed");
const position=document.getElementById("position");
const wind=document.getElementById("wind");
const rudder=document.getElementById("rudder");
const depth=document.getElementById("depth");

const status=document.getElementById("status");

function drawArrow(x,y,len,angle,color){

    ctx.save();

    ctx.translate(x,y);
    ctx.rotate(angle);

    ctx.strokeStyle=color;
    ctx.fillStyle=color;
    ctx.lineWidth=3;

    ctx.beginPath();
    ctx.moveTo(0,0);
    ctx.lineTo(len,0);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(len,0);
    ctx.lineTo(len-10,-5);
    ctx.lineTo(len-10,5);
    ctx.fill();

    ctx.restore();
}

function update(){

    let spd=parseFloat(speed.value);
    let pos=parseFloat(position.value);
    let wnd=parseFloat(wind.value);
    let rud=parseFloat(rudder.value);
    let dep=parseFloat(depth.value);

    document.getElementById("spdVal").innerText=spd;
    document.getElementById("posVal").innerText=pos;
    document.getElementById("windVal").innerText=wnd;
    document.getElementById("rudVal").innerText=rud;
    document.getElementById("depthVal").innerText=dep;

    let northDistance=Math.max(pos,5);
    let southDistance=Math.max(100-pos,5);

    let northEffect=(spd*spd)/(northDistance**1.5);
    let southEffect=(spd*spd)/(southDistance**1.5);

    let bankMoment=(northEffect-southEffect)*6;

    let windMoment=(wnd*wnd)*0.03;

    let rudderMoment=rud*0.5;

    let squat=((spd*0.514)**2)/(9.81)*(20/dep);

    let ukc=dep-squat;

    let totalMoment=
        bankMoment+
        windMoment-
        rudderMoment;

    let risk=Math.abs(totalMoment);

    let state="STABLE";
    let cls="stable";

    if(risk>25 || ukc<1){
        state="CRITICAL";
        cls="critical";
    }
    else if(risk>12 || ukc<2){
        state="WARNING";
        cls="warning";
    }

    status.className="status-box "+cls;

    status.innerHTML=
        state+
        " | Bank="+bankMoment.toFixed(1)+
        " | Wind="+windMoment.toFixed(1)+
        " | Squat="+squat.toFixed(2)+"m"+
        " | UKC="+ukc.toFixed(2)+"m";

    ctx.clearRect(0,0,canvas.width,canvas.height);

    ctx.fillStyle="#c2a679";
    ctx.fillRect(0,0,canvas.width,50);
    ctx.fillRect(0,300,canvas.width,50);

    ctx.strokeStyle="rgba(255,255,255,.3)";
    ctx.setLineDash([10,10]);

    ctx.beginPath();
    ctx.moveTo(0,175);
    ctx.lineTo(canvas.width,175);
    ctx.stroke();

    ctx.setLineDash([]);

    let shipX=500;

    let shipY=50+(pos/100)*250;

    let yaw=totalMoment*0.01;

    ctx.save();

    ctx.translate(shipX,shipY);
    ctx.rotate(yaw);

    ctx.fillStyle="#333";

    ctx.beginPath();

    ctx.moveTo(-120,-20);
    ctx.lineTo(100,-20);
    ctx.quadraticCurveTo(140,0,100,20);
    ctx.lineTo(-120,20);

    ctx.closePath();
    ctx.fill();

    ctx.strokeStyle="#999";
    ctx.stroke();

    if(Math.abs(bankMoment)>1){

        let cushionDir=
            bankMoment>0
            ? Math.PI/2
            : -Math.PI/2;

        let suctionDir=
            bankMoment>0
            ? -Math.PI/2
            : Math.PI/2;

        drawArrow(
            120,
            0,
            Math.abs(bankMoment)*3,
            cushionDir,
            "#ff4444"
        );

        drawArrow(
            -100,
            0,
            Math.abs(bankMoment)*4,
            suctionDir,
            "#44aaff"
        );
    }

    ctx.fillStyle="#ff44ff";
    ctx.fillText(
        "Squat -"+squat.toFixed(2)+"m",
        -40,
        0
    );

    ctx.restore();

    if(wnd>0){

        for(let i=0;i<3;i++){

            drawArrow(
                shipX-100+i*100,
                70,
                wnd,
                Math.PI/2,
                "#ffaa00"
            );

        }

    }

    if(
        Math.abs(bankMoment)>18 &&
        wnd>30 &&
        spd>12
    ){

        ctx.fillStyle="#ff0000";
        ctx.font="bold 26px Arial";

        ctx.fillText(
            "EVER GIVEN SCENARIO",
            320,
            170
        );
    }

}

[
speed,
position,
wind,
rudder,
depth
].forEach(
x=>x.addEventListener("input",update)
);

update();

</script>

</body>
</html>
